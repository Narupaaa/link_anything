<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Org Portal | Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-link-45deg fs-3 me-2 text-primary"></i>
                <span class="fw-bold">Org Portal</span>
            </a>
            <div class="d-flex align-items-center">
                <button class="btn btn-primary btn-sm me-3 rounded-pill" data-bs-toggle="modal" data-bs-target="#addLinkModal">
                    <i class="bi bi-plus-lg me-1"></i> Add Link
                </button>
                <button id="themeToggle" class="btn btn-link text-body p-0 me-3" title="Toggle Dark/Light Mode">
                    <i class="bi bi-sun-fill fs-4" id="themeIcon"></i>
                </button>
                <span class="badge bg-secondary rounded-pill d-none d-sm-inline-block">v1.0.0</span>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        <!-- Statistics Summary -->
        <div class="row g-3 mb-4 text-center">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h6 class="text-muted mb-1">Total Links</h6>
                        <h3 id="statTotalLinks" class="fw-bold mb-0">-</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h6 class="text-muted mb-1">Categories</h6>
                        <h3 id="statTotalCategories" class="fw-bold mb-0">-</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h6 class="text-muted mb-1">Active Systems</h6>
                        <h3 id="statActiveSystems" class="fw-bold mb-0">-</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- Search and Filter -->
        <div class="row g-3 mb-4 align-items-center">
            <div class="col-md-6">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                    <input type="text" id="searchInput" class="form-control border-start-0 ps-0" placeholder="Search systems, descriptions, or categories...">
                </div>
            </div>
            <div class="col-md-6">
                <div class="d-flex gap-2 justify-content-md-end">
                    <select id="categoryFilter" class="form-select w-auto">
                        <option value="all">All Categories</option>
                    </select>
                    <select id="sortOrder" class="form-select w-auto">
                        <option value="default">Sort: Default</option>
                        <option value="name">Sort: Name</option>
                        <option value="category">Sort: Category</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="text-center my-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-muted">Fetching systems data...</p>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="alert alert-danger d-none" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span id="errorText">Failed to load data. Please check your API URL.</span>
        </div>

        <!-- Card Grid -->
        <div id="linkGrid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            <!-- Cards will be injected here -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="container py-4 mt-5 border-top">
        <div class="row align-items-center">
            <div class="col-md-6 text-center text-md-start">
                <p class="text-muted mb-0">&copy; 2024 Your Organization. All rights reserved.</p>
            </div>
            <div class="col-md-6 text-center text-md-end">
                <small class="text-muted">Last Updated: <span id="lastUpdated">-</span></small>
            </div>
        </div>
    </footer>

    <!-- Add Link Modal -->
    <div class="modal fade" id="addLinkModal" tabindex="-1" aria-labelledby="addLinkModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="addLinkModalLabel">Add New System Link</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="addLinkForm">
                        <div class="mb-3">
                            <label class="form-label small">System Name *</label>
                            <input type="text" class="form-control" name="name" required placeholder="e.g. CRM System">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Description</label>
                            <textarea class="form-control" name="description" rows="2" placeholder="Briefly describe the system"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">URL *</label>
                            <input type="url" class="form-control" name="url" required placeholder="https://...">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label small">Category</label>
                                <input type="text" class="form-control" name="category" placeholder="e.g. Business">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label small">Bootstrap Icon</label>
                                <input type="text" class="form-control" name="icon" placeholder="e.g. bi-gear">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label small">Theme Color</label>
                                <select class="form-select" name="color">
                                    <option value="primary">Primary (Blue)</option>
                                    <option value="success">Success (Green)</option>
                                    <option value="warning">Warning (Yellow)</option>
                                    <option value="danger">Danger (Red)</option>
                                    <option value="info">Info (Cyan)</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label small">Sort Order</label>
                                <input type="number" class="form-control" name="sort_order" value="0">
                            </div>
                        </div>
                        <hr>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-danger">Admin Security Key *</label>
                            <input type="password" class="form-control" name="adminKey" required placeholder="Enter key to authorize">
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light rounded-pill" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" form="addLinkForm" class="btn btn-primary rounded-pill px-4" id="saveBtn">
                        <span id="saveBtnSpinner" class="spinner-border spinner-border-sm d-none me-1" role="status"></span>
                        Save System
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/app.js"></script>
</body>
</html>
